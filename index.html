<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY Coordinates</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    
        
    <header class="navbar">
    <h2 class="logo">Coordinates tool</h2>
        
    </header> 
    <div class="container">
        

<h2 class="ti">My Coordinates</h2>
<button onclick="getLocation()">Get Location</button>
<button onclick="copyCoordinates()">Copy Coordinates</button>
<button onclick="clearCoordinates()">Clear</button>

<p class="lat">latitude: <span id="lat"></span></p>
<p class="long">longitude: <span id="long"></span></p>
<iframe id="map" width="100%" height="300" ></iframe>
<button onclick="openInGoogleMaps()">Open in Google Maps</button>

<p id="status" class="status-box">status</p>

    </div>
<script src="javascript.js" defer></script>

<footer>
    <p class="footer">© 2026 Uraid. All rights reserved.</p>
</footer>
        
    

</body>
</html>
